<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Student Management</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        padding: 20px;
      }
      table {
        border-collapse: collapse;
        width: 100%;
      }
      th,
      td {
        border: 1px solid #ddd;
        padding: 8px;
      }
      th {
        background: #f4f4f4;
      }
      form {
        margin-top: 16px;
      }
      input,
      select {
        padding: 6px;
        margin-right: 8px;
      }
      .controls {
        margin-bottom: 12px;
      }
    </style>
  </head>
  <body>
    <h1>Student Management</h1>

    <div class="controls">
      <input id="search" placeholder="Search by name" />
      <button id="btnSearch">Search</button>
      <button id="btnRefresh">Refresh</button>
      <button id="btnExport">Export CSV</button>
    </div>

    <table id="studentsTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Major</th>
          <th>GPA</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <h2>Add / Edit Student</h2>
    <form id="studentForm">
      <input id="student_id" placeholder="Student ID" required />
      <input id="name" placeholder="Name" required />
      <input id="birth_year" placeholder="Birth Year" type="number" required />
      <input id="major" placeholder="Major" required />
      <input id="gpa" placeholder="GPA" type="number" step="0.01" required />
      <button type="submit">Add Student</button>
    </form>

    <script src="app.js"></script>
  </body>
</html>
